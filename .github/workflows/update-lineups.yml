name: Update lineups

on:
  schedule:
    # Every 30 minutes. RotoWire's lineups page only shows a lineup as
    # "confirmed" once it's near kickoff, so frequent polling catches the
    # predicted → confirmed transition without needing per-fixture
    # kickoff times (which aren't currently tracked in the schedule data).
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pandas numpy pyarrow requests beautifulsoup4

      - name: Scrape lineups
        run: python -m ingestion.scrape_lineups

      - name: Re-export frontend data
        run: python -m scripts.export_data

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update lineups"
            git pull --rebase origin main
            git push
          fi
