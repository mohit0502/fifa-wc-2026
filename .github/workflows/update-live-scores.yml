name: Update live scores

on:
  schedule:
    # Every 5 minutes. Each run makes 2 requests (today + yesterday) to
    # SportAPI7's free "BASIC" plan, so check the plan's request quota on
    # RapidAPI before leaving this running continuously for the whole
    # tournament — tighten/loosen the interval to fit it.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pandas numpy pyarrow scipy requests

      - name: Fetch live scores
        env:
          SPORTAPI7_KEY: ${{ secrets.SPORTAPI7_KEY }}
        run: python -m ingestion.fetch_live_scores

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/wc2026_fixtures.csv data/processed/wc2026_predictions.json frontend/public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update live scores"
            git pull --rebase origin main
            git push
          fi
